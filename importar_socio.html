function log(msg,cls='info'){
  const div=document.getElementById('log');
  div.style.display='block';
  div.innerHTML+=`<div class="${cls}">${msg}</div>`;
  div.scrollTop=div.scrollHeight;
}

async function importar(){
  const btn=document.getElementById('btn');
  btn.disabled=true;
  btn.textContent='⏳ Importando...';
  log('🚀 Iniciando importação de '+participantes.length+' participantes...');

  let ok=0,erros=0;
  for(const p of participantes){
    try{
      await db.collection('participants').doc(p.id).set(p);
      log(`✅ ${p.id} — ${p.name}`,'ok');
      ok++;
    }catch(e){
      log(`❌ Erro em ${p.id}: ${e.message}`,'err');
      erros++;
    }
    await new Promise(r=>setTimeout(r,300));
  }

  if(erros===0){
    log(`\n🎉 Importação concluída! ${ok} participantes salvos com sucesso.`,'ok');
    btn.textContent='✅ Importação Concluída!';
    btn.style.background='#2d5a1b';
  }else{
    log(`\n⚠️ Concluído com ${erros} erro(s). Verifique o log acima.`,'err');
    btn.textContent='⚠️ Concluído com erros';
    btn.disabled=false;
  }
}
